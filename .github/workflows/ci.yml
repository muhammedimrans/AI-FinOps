name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff (lint)
        run: ruff check app tests

      - name: Run Black (format check)
        run: black --check app tests

  backend-typecheck:
    name: Backend — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy app

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aifinops_test
          POSTGRES_USER: aifinops
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+asyncpg://aifinops:test_password@localhost:5432/aifinops_test
      REDIS_URL: redis://localhost:6379/0
      APP_SECRET_KEY: test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        working-directory: frontend
        run: pnpm lint

      - name: Run TypeScript check
        working-directory: frontend
        run: pnpm typecheck

  frontend-test:
    name: Frontend — Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: frontend
        run: pnpm test

      - name: Production build
        working-directory: frontend
        run: pnpm build

  # ─── SDK: Python ────────────────────────────────────────────────────────
  sdk-python:
    name: SDK (Python) — Lint, Type Check & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff (lint)
        run: ruff check costorah tests

      - name: Run mypy
        run: mypy costorah

      - name: Run tests
        run: pytest tests -q

      - name: Build package
        run: |
          pip install build
          python -m build

  # ─── SDK: JavaScript ────────────────────────────────────────────────────
  sdk-javascript:
    name: SDK (JavaScript) — Lint, Type Check, Tests & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: sdk/javascript

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build

  # ─── Docker ───────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck, backend-test, frontend-lint, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: cp .env.example .env

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./deployment/docker/backend/Dockerfile
          push: false
          target: development
          cache-from: type=gha
          cache-to: type=gha,mode=max
