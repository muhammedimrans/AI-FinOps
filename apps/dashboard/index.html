<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Costorah — AI Cost Observability Platform</title>
    <meta name="description" content="AI cost observability and financial operations platform" />
    <script>
      (function () {
        var THEMES = ["neon-cyber", "professional-light", "professional-dark"];
        try {
          var stored = localStorage.getItem("costorah-theme");
          var theme =
            THEMES.indexOf(stored) !== -1
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "professional-dark"
                : "professional-light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "professional-light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
